<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlyerForge — Muhammad Musa Bilal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,900;1,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="page-login" class="page">
    <div class="login-wrap">
      <div class="login-box">
        <div class="logo-row">
          <div class="logo-icon">FF</div>
          <span class="logo-text">FlyerForge</span>
        </div>
        <p class="login-sub">Private workspace · Muhammad Musa Bilal</p>
        <div class="field"><label>Username</label><input id="l-user" type="text" placeholder="musa" autocomplete="username"/></div>
        <div class="field"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
        <div id="login-error" class="error-msg hidden">Wrong username or password</div>
        <button id="btn-login" class="btn-gold">Sign In →</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="page-app" class="page hidden">

    <!-- HEADER -->
    <header class="header">
      <div class="logo-row">
        <div class="logo-icon">FF</div>
        <span class="logo-text">FlyerForge</span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" id="nav-create" onclick="showTab('create')">⚡ Create</button>
        <button class="nav-btn" id="nav-history" onclick="showTab('history')">📁 History</button>
      </nav>
      <div class="header-right">
        <span id="header-stats" class="header-stat"></span>
        <button class="btn-signout" onclick="signOut()">Sign Out</button>
      </div>
    </header>

    <!-- CREATE TAB -->
    <div id="tab-create" class="tab-content">
      <div class="app-layout">

        <!-- LEFT PANEL -->
        <aside class="panel">
          <div class="section">
            <p class="section-label">EVENT DETAILS</p>
            <div class="field"><label>Event Title *</label><input id="f-title" placeholder="Annual Gala Night"/></div>
            <div class="field"><label>Institute / Organization</label><input id="f-inst" placeholder="Institute of Computing"/></div>
            <div class="field-row">
              <div class="field"><label>Date</label><input id="f-date" placeholder="Apr 5, 2026"/></div>
              <div class="field"><label>Time</label><input id="f-time" placeholder="7:00 PM"/></div>
            </div>
            <div class="field"><label>Venue</label><input id="f-venue" placeholder="Main Auditorium"/></div>
            <div class="field"><label>Guest Name</label><input id="f-guest" placeholder="Dr. Sarah Ahmed"/></div>
            <div class="field"><label>Guest Role</label><input id="f-role" placeholder="CEO, TechVision"/></div>
            <div class="field"><label>Description</label><textarea id="f-desc" rows="2" placeholder="Brief event description..."></textarea></div>
          </div>

          <div class="divider"></div>

          <div class="section">
            <button id="btn-generate" class="btn-generate" disabled>⚡ GENERATE FLYER</button>
            <div id="save-row" class="hidden">
              <button id="btn-download" class="btn-secondary">↓ Download PNG</button>
              <button id="btn-save" class="btn-secondary btn-save">☁ Save to History</button>
            </div>
            <div id="save-status" class="save-status hidden"></div>
          </div>

          <div class="divider"></div>

          <div class="section">
            <p class="section-label">TEMPLATE <span id="tmpl-count">(50)</span></p>
            <div class="cat-tabs" id="cat-tabs"></div>
            <div class="tmpl-grid" id="tmpl-grid"></div>
          </div>
        </aside>

        <!-- PREVIEW -->
        <section class="preview-area">
          <div class="preview-status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">SELECT A TEMPLATE</span>
          </div>
          <div class="preview-wrap">
            <canvas id="flyer-canvas" width="900" height="1200"></canvas>
            <div class="preview-placeholder" id="preview-ph">
              <div class="ph-icon" id="ph-icon">✦</div>
              <p class="ph-title" id="ph-name">Noir Luxe</p>
              <p class="ph-hint">Fill in Event Title to preview</p>
            </div>
          </div>
        </section>

      </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="tab-content hidden">
      <div class="history-wrap">
        <div class="history-header">
          <h2 class="history-title">Your Flyer History</h2>
          <button class="btn-refresh" onclick="loadHistory()">↻ Refresh</button>
        </div>
        <div id="history-grid" class="history-grid">
          <div class="history-loading">Loading...</div>
        </div>
      </div>
    </div>

  </div>

  <script src="templates.js"></script>
  <script src="renderer.js"></script>
  <script src="app.js"></script>
</body>
</html>
